---
site:
  title: "Ansible Network Automation Workshop"
  url: https://rhpds.github.io/zt-network-automation-workshop/
  start_page: modules::index.adoc

asciidoc:
  attributes:
    lab_name: "Ansible Network Automation Workshop"
    release-version: master
    page-pagination: true

content:
  sources:
    - url: ./
      start_path: content

ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/rh-one-2025/ui-bundle.zip
    snapshot: true
  supplemental_files:
    - path: ./content/supplemental-ui
    - path: ./content/lib
    - path: .nojekyll
    - path: ui.yml
      contents: "static_files: [ .nojekyll ]"
    - path: partials/head-styles.hbs
      contents: |
        <link rel="stylesheet" href="{{{uiRootPath}}}/css/site.css">
        <style>
        .doc .imageblock{align-items:flex-start}
        .doc .imageblock img{border:1px solid #c0c4ca;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,.15);background-color:#f0f1f3;padding:8px}
        video{border:solid 1px black;box-shadow:0 4px 8px 0 rgba(0,0,0,.2),0 6px 20px 0 rgba(0,0,0,.19)}
        .doc{max-width:none}
        </style>

antora:
  extensions:
    - require: ./content/lib/dev-mode.js
      enabled: true

output:
  dir: ./www/www

runtime:
  cache_dir: ./.cache/antora
