---
- name: Destroy multi-vendor router containerlab topology
  hosts: containerlab
  gather_facts: false
  vars:
    clab_topology_dir: "{{ clab_topology_dir | default('/home/lab-user/1_multi_vendor_router') }}"

  tasks:
    - name: Containerlab destroy
      ansible.builtin.command:
        cmd: containerlab destroy
        chdir: "{{ clab_topology_dir }}"
      become: true
