---
# Full lab bring-up from the control node.
# AAP bootstrap runs first (localhost only, no SSH needed) so that Controller
# is pre-populated even if the containerlab topology play fails.
#
# Run only one half:
#   ansible-playbook -i inventory/lab.yml playbooks/aap_bootstrap.yml
#   ansible-playbook -i inventory/lab.yml playbooks/1_multi_vendor_router_up.yml
- import_playbook: aap_bootstrap.yml
- import_playbook: 1_multi_vendor_router_up.yml
