---
# Deploy the 1_multi_vendor_router topology on the containerlab VM.
- name: Deploy multi-vendor router containerlab topology
  hosts: containerlab
  gather_facts: false
  vars:
    clab_dir: "/home/lab-user/1_multi_vendor_router"

  tasks:
    - name: Containerlab deploy (reconfigure)
      ansible.builtin.command:
        cmd: containerlab deploy --reconfigure
        chdir: "{{ clab_dir }}"
      become: true
      register: clab_deploy

    - name: Record last-deployed topology for resume-on-boot
      ansible.builtin.copy:
        content: "{{ clab_dir }}"
        dest: /etc/containerlab/last-topology
        mode: "0644"
      become: true

    - name: Wait for nodes to settle
      ansible.builtin.pause:
        seconds: 120
      run_once: true

    - name: Containerlab inspect
      ansible.builtin.command:
        cmd: containerlab inspect
        chdir: "{{ clab_dir }}"
      become: true
      register: clab_inspect
      changed_when: false

    - name: Show containerlab inspect output
      ansible.builtin.debug:
        msg: "{{ clab_inspect.stdout_lines | default([]) }}"
      run_once: true
