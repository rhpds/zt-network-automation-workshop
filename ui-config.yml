---
type: showroom

# Match RHDP showroom defaults so tabs resolve correctly (see showroom_template_zero).
default_width: 30
persist_url_state: true

antora:
  name: modules
  dir: www
  modules:
    - name: 03-module-01-explore-lab
      label: "1-1: Explore the lab environment"
    - name: 04-module-02-first-playbook
      label: "1-2: First Ansible Playbook"
    - name: 05-module-03-facts
      label: "1-3: Ansible facts"
    - name: 06-module-04-resource-modules
      label: "1-4: Resource modules"
    - name: 07-module-05-explore-controller
      label: "2-1: Explore Automation controller"
    - name: 08-module-06-job-template
      label: "2-2: Job templates"
    - name: 09-module-07-survey
      label: "2-3: Surveys"
    - name: 10-module-08-rbac
      label: "2-4: RBAC"
    - name: 11-module-09-workflow
      label: "2-5: Workflows"

tabs:
  # Web shells on control (AAP) and containerlab. Paths match showroom WeTTY routes (wetty-control / wetty-containerlab).
  - name: AAP terminal
    path: /wetty-control
    port: 443
  - name: Containerlab terminal
    path: /wetty-containerlab
    port: 443
  - name: Ansible Automation Platform
    url: https://control-${guid}.${domain}/
    external: false
