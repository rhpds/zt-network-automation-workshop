---
containers: []
virtualmachines:
  - name: "containerlab"
    image: "ansiblebu-containerlab-v2"
    memory: "256Gi"
    cores: 64
    image_size: "200Gi"
    tags:
      - key: "AnsibleGroup"
        value: "isolated"
    networks:
      - default
    services:
      - name: containerlab-fip
        type: LoadBalancer
        ports:
          - port: 2222
            protocol: TCP
            targetPort: 2222
            name: port2222
          - port: 2223
            protocol: TCP
            targetPort: 2223
            name: port2223

          - port: 2224
            protocol: TCP
            targetPort: 2224
            name: port2224
          - port: 2225
            protocol: TCP
            targetPort: 2225
            name: port2225
          - port: 2226
            protocol: TCP
            targetPort: 2226
            name: port2226
          - port: 2227
            protocol: TCP
            targetPort: 2227
            name: port2227
          - port: 2228
            protocol: TCP
            targetPort: 2228
            name: port2228
          - port: 8181
            protocol: TCP
            targetPort: 8181
            name: port8181
          - port: 8282
            protocol: TCP
            targetPort: 8282
            name: port8282
          - port: 8383
            protocol: TCP
            targetPort: 8383
            name: port8383
          - port: 8484
            protocol: TCP
            targetPort: 8484
            name: port8484
      - name: containerlab-report
        ports:
          - port: 8088
            protocol: TCP
            targetPort: 8088
            name: containerlab-report
    routes:
      - name: containerlab-report
        host: containerlab-report
        service: containerlab-report
        targetPort: 8088
        tls: true
        tls_termination: Edge
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      runcmd:
        - echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd

  - name: control
    image: aap-2.6-2-ceh-20251103
    memory: 32G
    cores: 4
    image_size: 50Gi
    tags:
      - key: AnsibleGroup
        value: isolated
    networks:
      - default
      - secondary
    services:
      - name: control-https
        ports:
          - port: 443
            protocol: TCP
            targetPort: 443
            name: control-https
